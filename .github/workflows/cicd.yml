name: Build TrainerBookingService

on:
  push:
    branches: ["main"]

env:
  DOTNET_VERSION: 10.x
  API_PROJ_PATH: ./TrainerBookingService/TrainerBookingService.csproj

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.API_PROJ_PATH }}

      - name: Build
        run: dotnet build ${{ env.API_PROJ_PATH }} --configuration Release --no-restore
