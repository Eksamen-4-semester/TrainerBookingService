user nginx;

events {
    worker_connections 1000;
}
http {

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream authservices {
        server auth-service:8080;
    }

    upstream userservices {
        server user-service:8080;
    }

    upstream membershipservices{
        server membership-service:8080;
    }

    upstream trainerbookingservices {
        server trainerbooking-service:8080;
    }

    server {
            listen 4000;
           
            location /authservices/ {
                proxy_pass http://authservices/;
            }

            location /userservices/ {
                proxy_pass http://userservices/;
            }

            location /membershipservices/ {
                proxy_pass http://membershipservices/;
            }
            
            location /trainerbookingservices/ {
                proxy_pass http://trainerbookingservices/;
            }
            location / {
            proxy_pass http://frontend/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600;
            proxy_send_timeout 3600;
        }
    }
}