services:
  auth-service:
    image: mortenstaunstrup/authservice-image:latest
    container_name: auth-service
    expose:
      - "8080"
    networks:
      - fitlife
    environment:
      - VAULT_URL=https://vault:8201/
  
  user-service:
    image: mortenstaunstrup/userservice-image:latest
    container_name: user-service
    expose:
      - "8080"
    networks:
      - fitlife
    environment:
      - AUTHSERVICE_URL=http://nginx:4000/authservices/
      - VAULT_URL=https://vault:8201/
      - DOCKER=TRUE
  
  membership-service:
    image: mortenstaunstrup/membershipservice-image:latest
    container_name: membership-service
    expose:
      - "8080"
    networks:
      - fitlife
    environment:
      - AUTHSERVICE_URL=http://nginx:4000/authservices/
      - VAULT_URL=https://vault:8201/
      - DOCKER=TRUE


  trainerbooking-service:
    image: nicl841/trainerbookingservice-image:latest
    container_name: trainerbooking-service
    expose:
      - "8080"
    networks:
      - fitlife
    environment:
      - AUTHSERVICE_URL=http://nginx:4000/authservices/
      - USERSERVICE_URL=http://nginx:4000/userservices/
      - MEMBERSHIPSERVICE_URL=http://nginx:4000/membershipservices/
      - VAULT_URL=https://vault:8201/
      - DOCKER=TRUE


  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - user-service
      - membership-service
      - trainerbooking-service
    ports:
      - "4000:4000"
    networks:
      - fitlife


networks:
  fitlife:
    external: true

volumes:
  datakeys: